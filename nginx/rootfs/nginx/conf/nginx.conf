worker_processes auto;
pid /nginx/run/nginx.pid;
daemon off;
pcre_jit on;

events {
    worker_connections 4096;
    use epoll;
    worker_aio_requests 32;

    # Reduce overhead by repeatedly accept()ing until accept queue is empty.
    multi_accept on;
}

http {
    # Rate limiting
    limit_conn_zone $binary_remote_addr zone=limit_per_ip:20m;
    limit_conn limit_per_ip 512;
    limit_req_zone $binary_remote_addr zone=allips:20m rate=300r/s;
    limit_req zone=allips burst=300 nodelay;

    include /nginx/conf/mime.types;
    default_type  application/octet-stream;

    log_format  main_ext  '$remote_addr - $remote_user [$time_local] "$request" '
                          'status=$status bytes=$body_bytes_sent ref="$http_referer" '
                          '"$http_user_agent" '
                          '"$host" '
                          'ua="$upstream_addr" us="$upstream_status" ';

    access_log /nginx/logs/access.log main_ext buffer=16k flush=5s;
    error_log /nginx/logs/error.log warn;

    aio threads;
    aio_write on;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 65;
    keepalive_requests 1000;
    client_body_timeout 60;
    client_header_timeout 60;
    send_timeout 60;

    client_max_body_size 25G;
    client_body_buffer_size 1M;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;

    server_tokens off;
    more_clear_headers Server;

    gzip off;

    brotli on;
    brotli_static on;
    brotli_comp_level 6;
    brotli_min_length 256;
    brotli_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        application/vnd.api+json
        application/vnd.ms-fontobject
        application/x-font-opentype
        application/x-font-truetype
        application/x-font-ttf
        application/x-javascript
        application/xhtml+xml
        font/eot
        font/opentype
        font/otf
        font/truetype
        image/svg+xml
        image/vnd.microsoft.icon
        image/x-icon
        image/x-win-bitmap;


    include /sites-enabled/*.conf;
    include /nginx/custom_sites/*.conf;
    include /nginx/conf.d/stub_status.conf;
}
