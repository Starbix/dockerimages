name: nextcloud build

on:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: [master]
    paths: ['nextcloud/**', '.github/workflows/nextcloud-build.yml']
  pull_request:
    paths: ['nextcloud/**', '.github/workflows/nextcloud-build.yml']
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.m.outputs.matrix }}
    steps:
      - name: Discover latest two nextcloud majors
        id: m
        run: |
          set -euo pipefail
          all=""
          for page in 1 2 3 4 5; do
            resp=$(curl -fsSL "https://hub.docker.com/v2/repositories/library/nextcloud/tags?page_size=100&page=${page}") || break
            names=$(echo "$resp" | jq -r '.results[]?.name // empty')
            [ -z "$names" ] && break
            all+="${names}"$'\n'
          done
          fpm=$(echo "$all" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+-fpm-alpine$' | sed 's/-fpm-alpine$//' | sort -u)
          if [ -z "$fpm" ]; then
            echo "no matching tags found" >&2
            exit 1
          fi
          majors=$(echo "$fpm" | awk -F. '{print $1}' | sort -u -nr | head -2)
          include=""
          for major in $majors; do
            version=$(echo "$fpm" | grep "^${major}\." | sort -V | tail -1)
            include+="{\"major\":\"${major}\",\"version\":\"${version}\"},"
          done
          matrix="{\"include\":[${include%,}]}"
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"
          echo "discovered: ${matrix}"

  build:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./nextcloud
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64
          build-args: |
            VERSION=${{ matrix.version }}-
          tags: starbix/nextcloud:${{ matrix.major }}
          cache-from: type=gha,scope=nextcloud-${{ matrix.major }}
          cache-to: type=gha,mode=max,scope=nextcloud-${{ matrix.major }}
