name: nextcloud build

on:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: [master]
    paths: ['nextcloud/**', '.github/workflows/nextcloud-build.yml']
  pull_request:
    paths: ['nextcloud/**', '.github/workflows/nextcloud-build.yml']
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.m.outputs.matrix }}
    steps:
      - name: Discover latest two nextcloud majors
        id: m
        run: |
          set -euo pipefail
          all=""
          for page in 1 2 3 4 5; do
            resp=$(curl -fsSL "https://hub.docker.com/v2/repositories/library/nextcloud/tags?page_size=100&page=${page}") || break
            names=$(echo "$resp" | jq -r '.results[]?.name // empty')
            [ -z "$names" ] && break
            all+="${names}"$'\n'
          done
          fpm=$(echo "$all" | grep -E '^[0-9]+\.[0-9]+\.[0-9]+-fpm-alpine$' | sed 's/-fpm-alpine$//' | sort -u)
          if [ -z "$fpm" ]; then
            echo "no matching tags found" >&2
            exit 1
          fi
          majors=$(echo "$fpm" | awk -F. '{print $1}' | sort -u -nr | head -2)
          include=""
          for major in $majors; do
            version=$(echo "$fpm" | grep "^${major}\." | sort -V | tail -1)
            include+="{\"major\":\"${major}\",\"version\":\"${version}\"},"
          done
          matrix="{\"include\":[${include%,}]}"
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"
          echo "discovered: ${matrix}"

  build:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v7

      - uses: imjasonh/setup-crane@v0.7

      - name: Check if rebuild needed
        id: check
        run: |
          set -euo pipefail
          upstream_digest=$(crane digest docker.io/library/nextcloud:${{ matrix.version }}-fpm-alpine)
          echo "upstream=$upstream_digest" >> "$GITHUB_OUTPUT"

          stored_digest=""
          if cfg=$(crane config docker.io/starbix/nextcloud:${{ matrix.major }} 2>/dev/null); then
            stored_digest=$(echo "$cfg" | jq -r '.config.Labels["org.starbix.upstream-digest"] // ""')
          fi

          if [ "$upstream_digest" = "$stored_digest" ] && [ "${{ github.event_name }}" = "schedule" ]; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "Up to date with upstream $upstream_digest â€” skipping build"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
            echo "Rebuild needed (stored=$stored_digest upstream=$upstream_digest)"
          fi

      - uses: docker/setup-buildx-action@v4
        if: steps.check.outputs.needed == 'true'

      - name: Login to Docker Hub
        if: steps.check.outputs.needed == 'true' && github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        if: steps.check.outputs.needed == 'true'
        with:
          context: ./nextcloud
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64
          build-args: |
            VERSION=${{ matrix.version }}-
          tags: starbix/nextcloud:${{ matrix.major }}
          labels: |
            org.starbix.upstream-digest=${{ steps.check.outputs.upstream }}
            org.opencontainers.image.version=${{ matrix.version }}
          cache-from: type=gha,scope=nextcloud-${{ matrix.major }}
          cache-to: type=gha,mode=max,scope=nextcloud-${{ matrix.major }}
