name: nginx build

on:
  push:
    branches: [master]
    paths: ['nginx/**', '.github/workflows/nginx-build.yml']
  pull_request:
    paths: ['nginx/**', '.github/workflows/nginx-build.yml']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract versions
        id: v
        run: |
          set -euo pipefail
          nginx_ver=$(grep -oP 'ARG NGINX_VER=\K\S+' nginx/Dockerfile)
          openssl_version=$(grep -oP 'ARG OPENSSL_VERSION=\K\S+' nginx/Dockerfile)
          {
            echo "nginx_ver=$nginx_ver"
            echo "openssl_version=$openssl_version"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./nginx
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64
          tags: |
            starbix/nginx:latest
            starbix/nginx:${{ steps.v.outputs.nginx_ver }}
            starbix/nginx:${{ steps.v.outputs.nginx_ver }}-openssl${{ steps.v.outputs.openssl_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
